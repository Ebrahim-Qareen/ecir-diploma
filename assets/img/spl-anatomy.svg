<svg viewBox="0 0 1040 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" role="img" aria-label="Anatomy of an SPL search">
<title>SPL anatomy</title>
<rect width="1040" height="300" fill="#0a1226"/>
<text x="28" y="34" fill="#fff" font-size="18" font-weight="700">Anatomy of an SPL Search — Read It Left to Right</text>
<text x="1012" y="34" fill="#d4af37" font-size="12" font-weight="700" text-anchor="end">IT GATE</text>

<!-- the query bar -->
<rect x="24" y="66" width="992" height="52" rx="8" fill="#0e1730" stroke="#2b3f70" stroke-width="1.4"/>
<text x="40" y="99" font-family="monospace" font-size="15">
<tspan fill="#f0d78a">index=sysmon EventID=1</tspan><tspan fill="#7e91b8">  |  </tspan><tspan fill="#7fe0b4">search ParentImage="*WINWORD*"</tspan><tspan fill="#7e91b8">  |  </tspan><tspan fill="#b6a9f2">stats count by Image</tspan><tspan fill="#7e91b8">  |  </tspan><tspan fill="#37c7d4">sort -count</tspan></text>

<!-- part 1 -->
<rect x="24" y="150" width="228" height="118" rx="9" fill="#15213f" stroke="#d4af37" stroke-width="1.6"/>
<text x="138" y="174" text-anchor="middle" fill="#f0d78a" font-size="12.5" font-weight="700">1 · BASE SEARCH</text>
<text x="138" y="196" text-anchor="middle" fill="#c7d3e8" font-size="10.5">index + filters</text>
<text x="138" y="214" text-anchor="middle" fill="#c7d3e8" font-size="10.5">runs first, narrows data</text>
<text x="138" y="236" text-anchor="middle" fill="#93b0d8" font-size="10">always start here +</text>
<text x="138" y="252" text-anchor="middle" fill="#93b0d8" font-size="10">a time range</text>

<!-- part 2 -->
<rect x="268" y="150" width="228" height="118" rx="9" fill="#101f1a" stroke="#3fa87a" stroke-width="1.6"/>
<text x="382" y="174" text-anchor="middle" fill="#7fe0b4" font-size="12.5" font-weight="700">2 · REFINE</text>
<text x="382" y="196" text-anchor="middle" fill="#c7d3e8" font-size="10.5">| search  | where</text>
<text x="382" y="214" text-anchor="middle" fill="#c7d3e8" font-size="10.5">| rex  | eval</text>
<text x="382" y="236" text-anchor="middle" fill="#8fd0b4" font-size="10">filter more, or build</text>
<text x="382" y="252" text-anchor="middle" fill="#8fd0b4" font-size="10">new fields</text>

<!-- part 3 -->
<rect x="512" y="150" width="228" height="118" rx="9" fill="#1a1533" stroke="#8b7ce8" stroke-width="1.6"/>
<text x="626" y="174" text-anchor="middle" fill="#b6a9f2" font-size="12.5" font-weight="700">3 · TRANSFORM</text>
<text x="626" y="196" text-anchor="middle" fill="#c7d3e8" font-size="10.5">| stats  | top  | rare</text>
<text x="626" y="214" text-anchor="middle" fill="#c7d3e8" font-size="10.5">| timechart</text>
<text x="626" y="236" text-anchor="middle" fill="#b0a3e8" font-size="10">turns rows into</text>
<text x="626" y="252" text-anchor="middle" fill="#b0a3e8" font-size="10">counts / tables / charts</text>

<!-- part 4 -->
<rect x="756" y="150" width="260" height="118" rx="9" fill="#0e1730" stroke="#37c7d4" stroke-width="1.6"/>
<text x="886" y="174" text-anchor="middle" fill="#37c7d4" font-size="12.5" font-weight="700">4 · PRESENT</text>
<text x="886" y="196" text-anchor="middle" fill="#c7d3e8" font-size="10.5">| sort  | table  | fields</text>
<text x="886" y="214" text-anchor="middle" fill="#c7d3e8" font-size="10.5">| dedup  | head</text>
<text x="886" y="236" text-anchor="middle" fill="#93b8d8" font-size="10">order and shape the</text>
<text x="886" y="252" text-anchor="middle" fill="#93b8d8" font-size="10">final answer</text>

<text x="28" y="292" fill="#7e91b8" font-size="11">Each pipe  |  passes the result of the left side into the command on the right. Build one command at a time and check the output.</text>
</svg>
