<svg viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" role="img" aria-label="ECIR SOC Lab minimal topology v2">
  <title>ECIR SOC Lab — Minimal Topology (v2)</title>
  <desc>Four core VMs across two VMware segments behind a FortiGate firewall, with logs flowing to Splunk on SOC-CORE01 and DFIR evidence flowing to the student host.</desc>
  <defs>
    <marker id="c" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#37c7d4"/></marker>
    <marker id="r" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#e0556b"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#d4af37"/></marker>
  </defs>
  <rect width="1000" height="640" fill="#0a1226"/>

  <text x="32" y="40" fill="#fff" font-size="21" font-weight="700">ECIR SOC Lab — Minimal Topology (v2)</text>
  <text x="32" y="61" fill="#9fb0cf" font-size="12">ITGate Academy · VMware Workstation Pro · 4 core VMs · no Active Directory · FortiGate edge</text>
  <text x="968" y="44" fill="#d4af37" font-size="15" font-weight="700" text-anchor="end">IT GATE</text>

  <!-- internet + fortigate -->
  <rect x="408" y="82" width="184" height="34" rx="8" fill="#101a34" stroke="#2b3f70"/>
  <text x="500" y="104" fill="#e8edf7" font-size="13" font-weight="600" text-anchor="middle">INTERNET · VMnet8 (NAT)</text>
  <line x1="500" y1="116" x2="500" y2="138" stroke="#2b3f70" stroke-width="1.5"/>
  <rect x="398" y="138" width="204" height="52" rx="9" fill="#2b1e0d" stroke="#d4af37" stroke-width="2"/>
  <text x="500" y="160" fill="#f0d78a" font-size="14" font-weight="700" text-anchor="middle">FGT-FW01 · FortiGate-VM</text>
  <text x="500" y="178" fill="#bda45f" font-size="10.5" text-anchor="middle">port1 WAN · port2 LAN · port3 SOC · syslog→Splunk</text>

  <!-- LAN -->
  <rect x="28" y="222" width="470" height="252" rx="12" fill="#0e1730" stroke="#1f2d52" stroke-width="1.5"/>
  <text x="46" y="248" fill="#d4af37" font-size="14" font-weight="700">LAN · VMnet2 · 10.10.10.0/24</text>

  <rect x="48" y="266" width="200" height="76" rx="9" fill="#132244" stroke="#2b3f70" stroke-width="1.5"/>
  <text x="148" y="290" fill="#e8edf7" font-size="14" font-weight="600" text-anchor="middle">WIN-VICTIM01</text>
  <text x="148" y="308" fill="#8ea3c8" font-size="10.5" text-anchor="middle">Sysmon · UF · Wazuh agent</text>
  <text x="148" y="323" fill="#8ea3c8" font-size="10.5" text-anchor="middle">local accounts · DFIR target</text>
  <text x="148" y="337" fill="#5f7bb0" font-size="10" text-anchor="middle">.101 · 4 GB</text>

  <rect x="268" y="266" width="210" height="76" rx="9" fill="#132244" stroke="#2b3f70" stroke-width="1.5"/>
  <text x="373" y="290" fill="#e8edf7" font-size="14" font-weight="600" text-anchor="middle">LNX-VICTIM01</text>
  <text x="373" y="308" fill="#8ea3c8" font-size="10.5" text-anchor="middle">SSH · Apache+DVWA · MySQL</text>
  <text x="373" y="323" fill="#8ea3c8" font-size="10.5" text-anchor="middle">auditd · syslog · UF</text>
  <text x="373" y="337" fill="#5f7bb0" font-size="10" text-anchor="middle">.102 · 2 GB</text>

  <rect x="48" y="366" width="200" height="72" rx="9" fill="#2a1420" stroke="#e0556b" stroke-width="1.5"/>
  <text x="148" y="392" fill="#f2c3cb" font-size="14" font-weight="600" text-anchor="middle">KALI-ATK01</text>
  <text x="148" y="410" fill="#c98d99" font-size="10.5" text-anchor="middle">attacker · on demand</text>
  <text x="148" y="426" fill="#a86f7c" font-size="10" text-anchor="middle">.200 · 2–3 GB</text>

  <text x="268" y="392" fill="#6d81ab" font-size="11">Merged into these 3 VMs:</text>
  <text x="268" y="410" fill="#6d81ab" font-size="11">web server · DB · auth targets</text>
  <text x="268" y="428" fill="#6d81ab" font-size="11">— no separate DMZ or DC needed</text>

  <!-- SOC -->
  <rect x="522" y="222" width="450" height="252" rx="12" fill="#0e1730" stroke="#1f2d52" stroke-width="1.5"/>
  <text x="540" y="248" fill="#d4af37" font-size="14" font-weight="700">SOC · VMnet3 · 10.10.30.0/24</text>

  <rect x="542" y="266" width="410" height="118" rx="9" fill="#15213f" stroke="#d4af37" stroke-width="2"/>
  <text x="747" y="290" fill="#e8edf7" font-size="15" font-weight="700" text-anchor="middle">SOC-CORE01 · one box, many roles</text>
  <text x="747" y="311" fill="#8ea3c8" font-size="11" text-anchor="middle">Splunk Enterprise (primary SIEM) · syslog :514 · receiver :9997</text>
  <text x="747" y="329" fill="#8ea3c8" font-size="11" text-anchor="middle">Wazuh manager + FIM (L5, RAM permitting)</text>
  <text x="747" y="347" fill="#8ea3c8" font-size="11" text-anchor="middle">Docker: TheHive · Cortex (L6–L7) · Shuffle (L8)</text>
  <text x="747" y="368" fill="#5f7bb0" font-size="10" text-anchor="middle">.10 · 4–6 GB</text>

  <rect x="542" y="398" width="410" height="56" rx="9" fill="#111c36" stroke="#2b3f70" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="747" y="420" fill="#a8b8d6" font-size="12" font-weight="600" text-anchor="middle">SOC-NET01 — academy only (optional)</text>
  <text x="747" y="438" fill="#7e91b8" font-size="10.5" text-anchor="middle">Security Onion: Suricata IDS · Zeek · PCAP on mirrored traffic</text>

  <!-- links -->
  <line x1="300" y1="222" x2="450" y2="190" stroke="#2b3f70" stroke-width="1.5"/>
  <line x1="700" y1="222" x2="552" y2="190" stroke="#2b3f70" stroke-width="1.5"/>

  <!-- log flows -->
  <path d="M248 300 C 400 240, 460 250, 540 292" stroke="#37c7d4" stroke-width="1.7" fill="none" marker-end="url(#c)"/>
  <path d="M478 300 C 500 280, 510 280, 540 300" stroke="#37c7d4" stroke-width="1.7" fill="none" marker-end="url(#c)"/>
  <path d="M552 190 C 610 210, 640 240, 660 262" stroke="#d4af37" stroke-width="1.5" fill="none" stroke-dasharray="4 3" marker-end="url(#g)"/>

  <!-- attack flows -->
  <path d="M248 396 C 300 380, 320 350, 300 344" stroke="#e0556b" stroke-width="1.6" fill="none" stroke-dasharray="5 4" marker-end="url(#r)"/>
  <path d="M170 366 C 150 350, 150 350, 148 344" stroke="#e0556b" stroke-width="1.6" fill="none" stroke-dasharray="5 4" marker-end="url(#r)"/>

  <!-- DFIR host -->
  <rect x="28" y="492" width="470" height="60" rx="9" fill="#101f1a" stroke="#3fa87a" stroke-width="1.6"/>
  <text x="48" y="515" fill="#7fe0b4" font-size="13" font-weight="700">STUDENT HOST = ANALYST WORKSTATION (no VM)</text>
  <text x="48" y="534" fill="#93b8a8" font-size="10.5">FTK Imager · Volatility 3 · KAPE + EZ Tools · Chainsaw · Autopsy · Wireshark · pestudio</text>
  <path d="M148 490 C 120 470, 110 460, 120 445" stroke="#3fa87a" stroke-width="1.6" fill="none" stroke-dasharray="3 3"/>
  <text x="200" y="474" fill="#6f9c89" font-size="10">↑ evidence copied out: RAM dump · KAPE triage · disk image</text>

  <!-- legend -->
  <rect x="522" y="492" width="450" height="60" rx="9" fill="#0e1730" stroke="#1f2d52"/>
  <line x1="540" y1="512" x2="572" y2="512" stroke="#37c7d4" stroke-width="1.7" marker-end="url(#c)"/>
  <text x="580" y="516" fill="#c7d3e8" font-size="10.5">logs → SIEM</text>
  <line x1="690" y1="512" x2="722" y2="512" stroke="#e0556b" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#r)"/>
  <text x="730" y="516" fill="#c7d3e8" font-size="10.5">attack path</text>
  <line x1="840" y1="512" x2="872" y2="512" stroke="#d4af37" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#g)"/>
  <text x="880" y="516" fill="#c7d3e8" font-size="10.5">FW syslog</text>
  <text x="540" y="538" fill="#8ea3c8" font-size="10.5">Gold border = SIEM core · dashed box = academy-only component</text>

  <!-- footer notes -->
  <text x="32" y="580" fill="#c7d3e8" font-size="11">Total student footprint: 4 VMs, ~10–12 GB RAM with 2–3 powered on at a time. Runs on a 16 GB laptop; 8 GB works with one victim at a time.</text>
  <text x="32" y="600" fill="#c7d3e8" font-size="11">No Active Directory: local Windows accounts still produce 4624 / 4625 / 4688 / 4720 / 4724 / 4732 / 7045 — every eCIR-relevant auth and persistence event.</text>
  <text x="32" y="620" fill="#c7d3e8" font-size="11">Expansion without redesign: MISP, Velociraptor, ELK, cloud logs, honeypots drop into the SOC segment; extra victims drop into LAN.</text>
</svg>
