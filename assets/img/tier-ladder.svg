<svg viewBox="0 0 1000 430" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" role="img" aria-label="SOC tier escalation structure">
<title>SOC tiers and escalation</title>
<desc>Alerts escalate from Tier 1 to Tier 2 to Tier 3, with support roles beside and management above.</desc>
<defs><marker id="u" markerWidth="10" markerHeight="10" refX="4" refY="1" orient="auto"><path d="M0,8 L4,0 L8,8 Z" fill="#d4af37"/></marker></defs>
<rect width="1000" height="430" fill="#0a1226"/>
<text x="30" y="38" fill="#fff" font-size="19" font-weight="700">SOC Tiers — Where You Fit</text>
<text x="30" y="58" fill="#8ea3c8" font-size="12">Alerts flow upward as they get harder. Expertise flows downward as guidance.</text>
<text x="970" y="38" fill="#d4af37" font-size="12.5" font-weight="700" text-anchor="end">IT GATE</text>

<!-- severity arrow -->
<line x1="60" y1="360" x2="60" y2="120" stroke="#d4af37" stroke-width="2" marker-end="url(#u)"/>
<text x="44" y="250" fill="#bda45f" font-size="11" transform="rotate(-90 44 250)" text-anchor="middle">increasing severity &amp; complexity</text>

<!-- management -->
<rect x="100" y="86" width="300" height="46" rx="9" fill="#15213f" stroke="#d4af37" stroke-width="1.6"/>
<text x="250" y="106" text-anchor="middle" fill="#f0d78a" font-size="13" font-weight="700">CISO → SOC Manager</text>
<text x="250" y="123" text-anchor="middle" fill="#bda45f" font-size="10.5">oversight · metrics · reporting</text>

<!-- tier 3 -->
<rect x="100" y="146" width="300" height="66" rx="9" fill="#132244" stroke="#8b7ce8" stroke-width="1.6"/>
<text x="250" y="170" text-anchor="middle" fill="#b0a5f0" font-size="13.5" font-weight="700">TIER 3 · Threat Hunter</text>
<text x="250" y="189" text-anchor="middle" fill="#c7d3e8" font-size="11">hunts what nobody alerted on</text>
<text x="250" y="205" text-anchor="middle" fill="#8b93b8" font-size="10">reverse engineering · writes the detection rules</text>

<!-- tier 2 -->
<rect x="100" y="226" width="300" height="66" rx="9" fill="#132244" stroke="#37c7d4" stroke-width="1.6"/>
<text x="250" y="250" text-anchor="middle" fill="#37c7d4" font-size="13.5" font-weight="700">TIER 2 · Incident Responder</text>
<text x="250" y="269" text-anchor="middle" fill="#c7d3e8" font-size="11">investigates, scopes, contains</text>
<text x="250" y="285" text-anchor="middle" fill="#7e91b8" font-size="10">how did they get in? what did they touch?</text>

<!-- tier 1 -->
<rect x="100" y="306" width="300" height="66" rx="9" fill="#101f1a" stroke="#3fa87a" stroke-width="2"/>
<text x="250" y="330" text-anchor="middle" fill="#7fe0b4" font-size="13.5" font-weight="700">TIER 1 · SOC Analyst  ← you</text>
<text x="250" y="349" text-anchor="middle" fill="#c7d3e8" font-size="11">monitors the queue, triages, escalates</text>
<text x="250" y="365" text-anchor="middle" fill="#7ea595" font-size="10">real or false positive? how severe?</text>

<!-- escalation arrows -->
<path d="M410 330 L440 330 L440 262 L410 262" stroke="#d4af37" stroke-width="1.6" fill="none" marker-end="url(#u)" opacity="0"/>
<line x1="420" y1="336" x2="420" y2="270" stroke="#d4af37" stroke-width="1.6"/>
<path d="M414 276 L420 264 L426 276 Z" fill="#d4af37"/>
<text x="432" y="308" fill="#bda45f" font-size="10">escalate</text>

<line x1="420" y1="256" x2="420" y2="190" stroke="#d4af37" stroke-width="1.6"/>
<path d="M414 196 L420 184 L426 196 Z" fill="#d4af37"/>
<text x="432" y="228" fill="#bda45f" font-size="10">escalate</text>

<!-- support roles -->
<rect x="530" y="146" width="440" height="226" rx="10" fill="#0e1730" stroke="#1f2d52" stroke-width="1.5"/>
<text x="550" y="172" fill="#d4af37" font-size="12" font-weight="700" letter-spacing="1">SUPPORTING ROLES</text>

<rect x="550" y="188" width="196" height="52" rx="8" fill="#132244" stroke="#2b3f70"/>
<text x="648" y="208" text-anchor="middle" fill="#e8edf7" font-size="12" font-weight="600">SOC Engineer</text>
<text x="648" y="226" text-anchor="middle" fill="#8ea3c8" font-size="10">builds &amp; tunes the tools</text>

<rect x="758" y="188" width="196" height="52" rx="8" fill="#132244" stroke="#2b3f70"/>
<text x="856" y="208" text-anchor="middle" fill="#e8edf7" font-size="12" font-weight="600">Threat Intel Analyst</text>
<text x="856" y="226" text-anchor="middle" fill="#8ea3c8" font-size="10">supplies IOCs &amp; context</text>

<rect x="550" y="252" width="196" height="52" rx="8" fill="#132244" stroke="#2b3f70"/>
<text x="648" y="272" text-anchor="middle" fill="#e8edf7" font-size="12" font-weight="600">Forensics Analyst</text>
<text x="648" y="290" text-anchor="middle" fill="#8ea3c8" font-size="10">memory &amp; disk evidence</text>

<rect x="758" y="252" width="196" height="52" rx="8" fill="#132244" stroke="#2b3f70"/>
<text x="856" y="272" text-anchor="middle" fill="#e8edf7" font-size="12" font-weight="600">Malware Analyst</text>
<text x="856" y="290" text-anchor="middle" fill="#8ea3c8" font-size="10">what does the payload do?</text>

<rect x="550" y="316" width="404" height="42" rx="8" fill="#2a1420" stroke="#e0556b" stroke-width="1.3"/>
<text x="752" y="336" text-anchor="middle" fill="#f2c3cb" font-size="12" font-weight="600">Red Team</text>
<text x="752" y="352" text-anchor="middle" fill="#c98d99" font-size="10">attacks us on purpose to test whether the SOC notices</text>

<text x="30" y="404" fill="#7e91b8" font-size="11">Naming note: INE uses Tier 1/2/3 — that is the exam answer. Many companies say "L1/L2" and treat engineers and managers as separate roles.</text>
</svg>
